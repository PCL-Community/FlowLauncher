name: Build (Test)

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - '**/.gitignore'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE*'
      - 'docs/**'
      - 'LICENSE*'

jobs:
  test:
    uses: ./.github/workflows/build-reusable.yml
    with:
      debug: true
